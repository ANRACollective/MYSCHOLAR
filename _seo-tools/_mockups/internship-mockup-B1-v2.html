<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyScholar Internships — Dark Mode v2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1120;
  --bg-elevated:#131b2e;
  --bg-card:#172033;
  --bg-card-hover:#1c2840;
  --bg-glass:rgba(255,255,255,0.06);
  --bg-glass-hover:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.1);
  --glass-border-hover:rgba(255,255,255,0.2);
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:#64748b;
  --accent:#38bdf8;
  --accent-glow:rgba(56,189,248,0.15);
  --urgent:#f87171;
  --urgent-bg:rgba(248,113,113,0.1);
  --success:#34d399;
  --success-bg:rgba(52,211,153,0.1);
  --border:rgba(255,255,255,0.08);
  --border-hover:rgba(255,255,255,0.15);
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --sector-glc:#34d399;
  --sector-banking:#60a5fa;
  --sector-tech:#f472b6;
  --sector-gov:#fbbf24;
  --sector-corp:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── HEADER ─────────────────────────────── */
.header{padding:28px 16px 16px;max-width:700px;margin:0 auto}
.brand{font-family:var(--serif);font-size:28px;font-weight:900;color:var(--text-primary);letter-spacing:-0.5px}
.brand span{color:var(--accent)}
nav{display:flex;gap:20px;margin-top:14px}
nav a{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;padding-bottom:5px;border-bottom:2px solid transparent;transition:all 0.2s}
nav a.active{color:var(--accent);border-bottom-color:var(--accent)}
nav a:hover{color:var(--text-secondary)}
.subtitle{font-size:14px;color:var(--text-secondary);margin-top:10px;font-weight:300}

/* ── SEARCH ─────────────────────────────── */
.search-wrap{max-width:700px;margin:22px auto 0;padding:0 16px}
.search-input{width:100%;padding:13px 18px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-family:var(--sans);font-size:14px;outline:none;transition:all 0.2s}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

/* ── FILTERS ────────────────────────────── */
.filters{max-width:700px;margin:16px auto 0;padding:0 16px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{padding:7px 15px;border-radius:18px;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;user-select:none;backdrop-filter:blur(8px)}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.toggle-row{display:flex;gap:8px;margin-bottom:8px}
.toggle{padding:7px 15px;border-radius:18px;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;user-select:none}
.toggle.on{background:var(--success);color:#064e3b;border-color:var(--success);font-weight:600}
.summary{font-size:12px;color:var(--text-muted);padding:8px 0}

/* ── LIST FEED ──────────────────────────── */
.feed{max-width:700px;margin:8px auto 32px;padding:0 16px;display:flex;flex-direction:column;gap:12px}

.row{background:var(--bg-card);border-radius:14px;padding:18px;border:1px solid var(--border);border-left:4px solid var(--text-muted);transition:all 0.3s;cursor:pointer}
.row:hover{background:var(--bg-card-hover);border-color:var(--border-hover);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.row.sector-glc{border-left-color:var(--sector-glc)}
.row.sector-banking{border-left-color:var(--sector-banking)}
.row.sector-tech{border-left-color:var(--sector-tech)}
.row.sector-government{border-left-color:var(--sector-gov)}
.row.sector-corporate{border-left-color:var(--sector-corp)}

.row-top{display:flex;align-items:center;gap:14px;margin-bottom:8px}

/* ── LOGO / AVATAR ──────────────────────── */
.logo-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;background:var(--bg-elevated);border:1px solid var(--border)}
.logo-wrap img{width:100%;height:100%;object-fit:contain;padding:6px;position:absolute;top:0;left:0}
.logo-wrap .fallback{font-size:18px;font-weight:700;color:var(--text-secondary);z-index:0}
.logo-wrap img[data-loaded="true"]~.fallback{display:none}

.row-header{flex:1;min-width:0}
.company-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.company{font-size:18px;font-weight:700;color:var(--text-primary);letter-spacing:-0.3px}
.sector-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:8px;text-transform:uppercase;letter-spacing:0.4px}
.pill-glc{background:var(--success-bg);color:var(--sector-glc)}
.pill-banking{background:rgba(96,165,250,0.1);color:var(--sector-banking)}
.pill-tech{background:rgba(244,114,182,0.1);color:var(--sector-tech)}
.pill-government{background:rgba(251,191,36,0.1);color:var(--sector-gov)}
.pill-corporate{background:rgba(167,139,250,0.1);color:var(--sector-corp)}

.programme{font-size:13px;color:var(--text-secondary);font-weight:400;margin-top:2px}

/* ── AI DESCRIPTION ─────────────────────── */
.ai-desc{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-top:10px;padding:10px 12px;background:var(--bg-elevated);border-radius:8px;border:1px solid var(--border)}

/* ── META ROW ───────────────────────────── */
.meta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;font-size:12.5px;color:var(--text-muted)}
.meta-item{display:flex;align-items:center;gap:5px}
.meta-item .ic{font-size:14px}
.stipend{color:var(--success);font-weight:700;font-size:13px}
.deadline-urgent{color:var(--urgent);font-weight:600}
.urgent-badge{display:inline-block;background:var(--urgent-bg);color:var(--urgent);font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.3px;margin-right:4px}
.rolling-pill{display:inline-block;background:var(--success-bg);color:var(--success);font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px}

/* ── GLASS APPLY BUTTON ─────────────────── */
.apply-row{margin-top:14px;display:flex;align-items:center;justify-content:space-between}
.apply-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:var(--bg-glass);color:var(--text-primary);border:1.5px solid var(--glass-border);border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;transition:all 0.25s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);letter-spacing:0.2px}
.apply-btn:hover{background:var(--bg-glass-hover);border-color:var(--glass-border-hover);box-shadow:0 0 20px rgba(56,189,248,0.1);color:var(--accent)}
.apply-btn .arrow{transition:transform 0.2s}
.apply-btn:hover .arrow{transform:translateX(3px)}
.view-hint{font-size:11px;color:var(--text-muted);font-style:italic}
@media(max-width:500px){
  .apply-btn{width:100%;justify-content:center;padding:12px}
  .view-hint{display:none}
}

/* ── DETAIL MODAL ───────────────────────── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;justify-content:center;align-items:flex-end;padding:0}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center;padding:24px}}

.modal{background:var(--bg-elevated);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:0;border:1px solid var(--border);box-shadow:0 -8px 40px rgba(0,0,0,0.4);animation:slideUp 0.3s ease}
@media(min-width:600px){.modal{border-radius:16px;max-height:80vh}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

.modal-handle{width:40px;height:4px;background:var(--text-muted);border-radius:2px;margin:12px auto 0;opacity:0.4}
@media(min-width:600px){.modal-handle{display:none}}

.modal-header{padding:20px 24px 0;display:flex;align-items:flex-start;gap:16px}
.modal-logo{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;background:var(--bg-card);border:1px solid var(--border)}
.modal-logo img{width:100%;height:100%;object-fit:contain;padding:8px;position:absolute;top:0;left:0}
.modal-logo .fallback{font-size:22px;font-weight:700;color:var(--text-secondary)}
.modal-info{flex:1}
.modal-company{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-0.3px}
.modal-programme{font-size:14px;color:var(--text-secondary);margin-top:2px}
.modal-sector{display:inline-block;margin-top:6px}

.modal-body{padding:20px 24px}
.modal-desc{font-size:14px;color:var(--text-secondary);line-height:1.65;margin-bottom:20px}
.modal-desc strong{color:var(--text-primary);font-weight:600}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-card{background:var(--bg-card);border-radius:10px;padding:12px;border:1px solid var(--border)}
.detail-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.detail-value{font-size:14px;font-weight:600;color:var(--text-primary)}
.detail-value.green{color:var(--success)}
.detail-value.red{color:var(--urgent)}

.modal-section{margin-bottom:16px}
.modal-section-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px}
.modal-tag{padding:5px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);font-size:12px;color:var(--text-secondary)}

.modal-apply{display:block;width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:12px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:all 0.2s;letter-spacing:0.2px}
.modal-apply:hover{opacity:0.9;transform:translateY(-1px)}

.modal-close{position:absolute;top:16px;right:20px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all 0.2s;z-index:2}
.modal-close:hover{background:var(--bg-card-hover);color:var(--text-primary)}

/* ── FOOTER ─────────────────────────────── */
.footer{text-align:center;padding:20px 16px;font-size:11px;color:var(--text-muted)}
.footer a{color:var(--accent);text-decoration:none}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div class="brand">My<span>Scholar</span></div>
  <nav>
    <a href="https://myscholar.my">Scholarships</a>
    <a href="#" class="active">Internships</a>
  </nav>
  <p class="subtitle">Curated internship programmes for Malaysian students</p>
</div>

<div class="search-wrap">
  <input class="search-input" id="search" type="text" placeholder="Search company or programme...">
</div>

<div class="filters">
  <div class="chip-row" id="chips">
    <div class="chip active" data-sector="all">All</div>
    <div class="chip" data-sector="GLC">GLC</div>
    <div class="chip" data-sector="Banking">Banking</div>
    <div class="chip" data-sector="Tech">Tech</div>
    <div class="chip" data-sector="Government">Government</div>
  </div>
  <div class="toggle-row">
    <div class="toggle" id="paidToggle">Paid Only</div>
    <div class="toggle" id="openToggle">Open Now</div>
  </div>
  <div class="summary" id="summary"></div>
</div>

<div class="feed" id="feed"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="footer"><a href="https://myscholar.my">myscholar.my</a> &mdash; Free scholarship & internship finder for Malaysian students</div>

<script>
const TODAY = new Date(2026, 3, 12);

const DATA = [
  {
    company: "Khazanah Nasional",
    programme: "Khazanah Young Professionals Programme",
    sector: "GLC",
    location: "Kuala Lumpur",
    duration: "12 weeks",
    stipend: "RM2,500/mo",
    paid: true,
    deadline: "2026-05-15",
    rolling: false,
    logo_domain: "khazanah.com.my",
    description: "One of Malaysia's most competitive GLC internships. Interns work directly with investment and strategy teams across sectors including technology, healthcare, and infrastructure. Strong mentorship culture with exposure to sovereign wealth fund operations.",
    eligibility: "Malaysian citizens, final-year undergrads or recent graduates",
    fields: ["Finance", "Strategy", "Economics", "Engineering"],
    perks: ["Structured mentorship", "Senior leadership exposure", "Certificate of completion"]
  },
  {
    company: "Maybank",
    programme: "Maybank GO Internship",
    sector: "Banking",
    location: "Nationwide",
    duration: "10 weeks",
    stipend: "RM1,800/mo",
    paid: true,
    deadline: null,
    rolling: true,
    logo_domain: "maybank.com",
    description: "Maybank's flagship internship places students across retail banking, corporate finance, IT, and digital transformation teams. Interns get rotational exposure and many receive return offers for the Maybank Graduate Programme.",
    eligibility: "Undergrads in penultimate or final year, min CGPA 3.0",
    fields: ["Banking", "Finance", "IT", "Marketing"],
    perks: ["Rotational placement", "Networking events", "Return offer pathway"]
  },
  {
    company: "Petronas",
    programme: "PETRONAS Internship Programme",
    sector: "GLC",
    location: "KL / Kerteh",
    duration: "6 months",
    stipend: "RM2,000/mo",
    paid: true,
    deadline: "2026-04-30",
    rolling: false,
    logo_domain: "petronas.com",
    description: "Petronas runs one of the largest structured internship programmes in Malaysia. Placements span upstream, downstream, gas & new energy, and corporate divisions. Six-month duration allows meaningful project ownership.",
    eligibility: "Malaysian citizens, currently enrolled in a recognised university",
    fields: ["Engineering", "Geoscience", "IT", "Business", "HSE"],
    perks: ["Project ownership", "Technical training", "PETRONAS campus facilities"]
  },
  {
    company: "Bank Negara",
    programme: "BNM Internship Scheme",
    sector: "Government",
    location: "Kuala Lumpur",
    duration: "3 months",
    stipend: "RM1,500/mo",
    paid: true,
    deadline: "2026-04-28",
    rolling: false,
    logo_domain: "bnm.gov.my",
    description: "Intern at Malaysia's central bank across departments including monetary policy, financial surveillance, payment systems, and economics. Highly regarded on CVs and offers deep exposure to public sector policy-making.",
    eligibility: "Malaysian citizens, undergrads with min CGPA 3.0",
    fields: ["Economics", "Finance", "Law", "Data Science", "IT"],
    perks: ["Policy exposure", "Research mentorship", "KL city centre location"]
  },
  {
    company: "Grab",
    programme: "GrabStar Internship",
    sector: "Tech",
    location: "Kuala Lumpur",
    duration: "12 weeks",
    stipend: "RM2,200/mo",
    paid: true,
    deadline: "2026-05-31",
    rolling: false,
    logo_domain: "grab.com",
    description: "Southeast Asia's leading superapp places interns in engineering, product, design, data, and operations teams. Fast-paced startup culture with real shipping responsibilities. Strong alumni network across the regional tech ecosystem.",
    eligibility: "Penultimate or final-year students, any nationality",
    fields: ["Software Engineering", "Product", "Data Science", "Design", "Operations"],
    perks: ["Ship real features", "Startup culture", "Regional tech network"]
  },
  {
    company: "TNB",
    programme: "TNB Internship Programme",
    sector: "GLC",
    location: "Nationwide",
    duration: "3\u20136 months",
    stipend: "RM1,200/mo",
    paid: true,
    deadline: null,
    rolling: true,
    logo_domain: "tnb.com.my",
    description: "Tenaga Nasional offers placements across power generation, transmission, distribution, and corporate services. Ideal for engineering students with interest in energy transition, renewable energy, and large-scale infrastructure.",
    eligibility: "Malaysian citizens, diploma or degree students",
    fields: ["Electrical Engineering", "Mechanical Engineering", "IT", "Finance"],
    perks: ["Nationwide placements", "Energy sector exposure", "Flexible duration"]
  },
  {
    company: "CIMB",
    programme: "CIMB Fusion Internship",
    sector: "Banking",
    location: "Kuala Lumpur",
    duration: "10 weeks",
    stipend: "RM1,500/mo",
    paid: true,
    deadline: "2026-05-15",
    rolling: false,
    logo_domain: "cimb.com",
    description: "CIMB's Fusion programme is designed to give interns cross-functional exposure across investment banking, treasury, consumer banking, and digital. Includes structured workshops and a capstone project presented to senior management.",
    eligibility: "Penultimate-year undergrads, min CGPA 3.2",
    fields: ["Finance", "Investment Banking", "Digital", "Risk Management"],
    perks: ["Cross-functional rotation", "Capstone project", "Senior management exposure"]
  },
  {
    company: "MDEC",
    programme: "Malaysia Digital Internship",
    sector: "Government",
    location: "KL / Remote",
    duration: "6 months",
    stipend: "RM1,000/mo",
    paid: true,
    deadline: "2026-05-20",
    rolling: false,
    logo_domain: "mdec.my",
    description: "MDEC drives Malaysia's digital economy agenda. Interns work on national-level digital inclusion, startup ecosystem, and tech investment initiatives. Unique exposure to government-tech intersection with flexible remote options.",
    eligibility: "Malaysian citizens, undergrads or recent graduates",
    fields: ["Digital Policy", "Marketing", "Data Analytics", "Startup Ecosystem"],
    perks: ["Remote-friendly", "National-level projects", "Digital economy exposure"]
  }
];

function isUrgent(d) {
  if (!d) return false;
  return ((new Date(d) - TODAY) / 864e5) <= 14 && (new Date(d) >= TODAY);
}
function isOpen(i) { return i.rolling || !i.deadline || (new Date(i.deadline) >= TODAY); }
function fmtDl(i) {
  if (i.rolling) return '<span class="rolling-pill">Rolling</span>';
  if (!i.deadline) return '\u2014';
  const d = new Date(i.deadline), s = d.toLocaleDateString('en-MY', { day: 'numeric', month: 'short' });
  return (isUrgent(i.deadline) ? '<span class="urgent-badge">Closing soon</span>' : '') + s;
}
function sc(s) { return s.toLowerCase(); }

function logoHTML(domain, company, size) {
  const sz = size || 80;
  const url = 'https://img.logo.dev/' + domain + '?token=pk_anonymous&size=' + sz + '&format=png';
  return `<span class="fallback">${company[0]}</span><img src="${url}" alt="${company}" onerror="this.remove()" onload="this.dataset.loaded='true'">`;
}

function render() {
  const feed = document.getElementById('feed');
  const sector = document.querySelector('#chips .chip.active')?.dataset.sector || 'all';
  const paidOnly = document.getElementById('paidToggle').classList.contains('on');
  const openOnly = document.getElementById('openToggle').classList.contains('on');
  const q = document.getElementById('search').value.toLowerCase().trim();
  feed.innerHTML = '';
  let c = 0;

  DATA.forEach((item, idx) => {
    if (sector !== 'all' && item.sector !== sector) return;
    if (paidOnly && !item.paid) return;
    if (openOnly && !isOpen(item)) return;
    if (q && !item.company.toLowerCase().includes(q) && !item.programme.toLowerCase().includes(q)) return;
    c++;

    const el = document.createElement('div');
    el.className = 'row sector-' + sc(item.sector);
    el.style.animation = 'fadeIn 0.3s ease ' + (c * 0.04) + 's both';
    el.onclick = () => openModal(idx);

    // Truncate description for card preview (first sentence only)
    const preview = item.description.split('. ')[0] + '.';

    el.innerHTML = `
      <div class="row-top">
        <div class="logo-wrap">${logoHTML(item.logo_domain, item.company)}</div>
        <div class="row-header">
          <div class="company-line">
            <span class="company">${item.company}</span>
            <span class="sector-pill pill-${sc(item.sector)}">${item.sector}</span>
          </div>
          <div class="programme">${item.programme}</div>
        </div>
      </div>
      <div class="ai-desc">${preview}</div>
      <div class="meta">
        <span class="meta-item"><span class="ic">&#x1F4CD;</span>${item.location}</span>
        <span class="meta-item"><span class="ic">&#x23F1;</span>${item.duration}</span>
        <span class="meta-item stipend"><span class="ic">&#x1F4B0;</span>${item.stipend}</span>
        <span class="meta-item ${isUrgent(item.deadline) ? 'deadline-urgent' : ''}"><span class="ic">&#x1F4C5;</span>${fmtDl(item)}</span>
      </div>
      <div class="apply-row">
        <a href="#" class="apply-btn" onclick="event.stopPropagation()">Apply<span class="arrow">&rarr;</span></a>
        <span class="view-hint">Tap for details</span>
      </div>`;
    feed.appendChild(el);
  });

  document.getElementById('summary').textContent = c + ' internship' + (c !== 1 ? 's' : '') + ' found';
}

/* ── MODAL ──────────────────────────────── */
function openModal(idx) {
  const item = DATA[idx];
  const overlay = document.getElementById('modalOverlay');
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');

  const dlFull = item.rolling ? 'Rolling intake \u2014 apply anytime'
    : item.deadline ? 'Closes ' + new Date(item.deadline).toLocaleDateString('en-MY', { day: 'numeric', month: 'long', year: 'numeric' })
    : 'Check website for dates';

  header.innerHTML = `
    <div class="modal-logo">${logoHTML(item.logo_domain, item.company, 120)}</div>
    <div class="modal-info">
      <div class="modal-company">${item.company}</div>
      <div class="modal-programme">${item.programme}</div>
      <span class="sector-pill pill-${sc(item.sector)} modal-sector">${item.sector}</span>
    </div>`;

  body.innerHTML = `
    <p class="modal-desc">${item.description}</p>

    <div class="detail-grid">
      <div class="detail-card">
        <div class="detail-label">Stipend</div>
        <div class="detail-value green">${item.stipend}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">Duration</div>
        <div class="detail-value">${item.duration}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">Location</div>
        <div class="detail-value">${item.location}</div>
      </div>
      <div class="detail-card">
        <div class="detail-label">Deadline</div>
        <div class="detail-value ${isUrgent(item.deadline) ? 'red' : ''}">${dlFull}</div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Eligibility</div>
      <p class="modal-desc" style="margin-bottom:0">${item.eligibility}</p>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Fields</div>
      <div class="modal-tags">${item.fields.map(f => '<span class="modal-tag">' + f + '</span>').join('')}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Perks</div>
      <div class="modal-tags">${item.perks.map(p => '<span class="modal-tag">' + p + '</span>').join('')}</div>
    </div>

    <a href="#" class="modal-apply">Apply to ${item.company} &rarr;</a>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

/* ── FILTER EVENTS ──────────────────────── */
document.querySelectorAll('#chips .chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#chips .chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    render();
  });
});
['paidToggle', 'openToggle'].forEach(id => {
  document.getElementById(id).addEventListener('click', function () {
    this.classList.toggle('on');
    render();
  });
});
document.getElementById('search').addEventListener('input', render);

render();
</script>
</body>
</html>
