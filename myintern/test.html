<!DOCTYPE html>
<html lang="en-MY">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyIntern — Test Suite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1e;font-family:-apple-system,sans-serif;color:#f1f5f9;padding:20px;min-height:100vh}
h1{font-size:20px;font-weight:700;margin-bottom:20px}
.summary{background:#0d1426;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:20px}
.summary-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;font-weight:600}
.bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s}
.group{background:#0d1426;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:12px}
.group-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.group-name{font-size:14px;font-weight:600}
.group-result{font-size:12px;font-weight:700}
.test{font-size:12px;padding:4px 8px;border-radius:4px;margin-bottom:2px}
.pass{color:#94a3b8}.fail{color:#f1f5f9;background:rgba(248,113,113,.06)}
.pass-icon{color:#34d399;margin-right:6px}.fail-icon{color:#f87171;margin-right:6px;font-weight:700}
.btn{display:inline-block;padding:10px 20px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;text-decoration:none}
.btn:hover{opacity:.9}
.note{font-size:11px;color:#64748b;margin-top:16px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<h1>MyIntern — Test Suite</h1>
<div class="summary" id="summary">Loading shared files...</div>
<div id="results"></div>
<a href="index.html" class="btn">Back to Hub</a>
<p class="note">Tests run against shared state (localStorage). Each test profile simulates a full student journey.</p>

<!-- Load shared files (same as all pages) -->
<script src="shared/myintern-data.js"></script>
<script src="shared/myintern-shared.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   AUTO-TEST SUITE for MyIntern split architecture
   Tests: shared files load, state management, data integrity,
   scoring, gap analysis, interview generation, cross-page nav
   ══════════════════════════════════════════════════════════════ */

var TEST_PROFILES=[
  {name:'CS Student — UiTM, Full CV',data:{name:'Nur Aisyah binti Ahmad',email:'aisyah@gmail.com',phone:'012-345 6789',city:'Shah Alam, Selangor',university:'Universiti Teknologi MARA (UiTM)',course:'Bachelor of Computer Science',level:'deg-final',projects:['Student Management System','Mobile App','Data Analysis / Dashboard'],projectDescs:{0:'Built a student attendance system using PHP and MySQL for 60+ students',1:'Developed a canteen ordering app using Flutter',2:'Analysed 2 years of sales data using Python pandas'},activities:['PALAPES (Army/Navy/Air)','Club / Persatuan President','Hackathon','Part-time Retail'],activityDetail:'Was AJK for Faculty Night 2025',skills:['Python','Java','HTML / CSS','JavaScript','SQL','Excel / Spreadsheets','Bahasa Malaysia','English','MUET'],motivation:'real-exp',motivationText:'As a final-year CS student at UiTM, I want to apply my Python and SQL skills in a production environment.'},expectedScoreMin:75,expectedScoreMax:100},
  {name:'Business Student — Politeknik, Minimal',data:{name:'Ahmad bin Ismail',email:'ahmad@email.com',phone:'',city:'',university:'Politeknik Sultan Salahuddin Abdul Aziz Shah',course:'Diploma in Accountancy',level:'dip-early',projects:[],projectDescs:{},activities:['Community Service'],activityDetail:'',skills:['Excel / Spreadsheets','Bahasa Malaysia'],motivation:'li-req',motivationText:''},expectedScoreMin:25,expectedScoreMax:50},
  {name:'Engineering — UTHM, Skips Everything',data:{name:'Raj Kumar',email:'raj@test.com',phone:'011-111 1111',city:'Johor Bahru',university:'Universiti Tun Hussein Onn Malaysia (UTHM)',course:'Bachelor of Mechanical Engineering',level:'deg-3',projects:[],projectDescs:{},activities:[],activityDetail:'',skills:[],motivation:null,motivationText:''},expectedScoreMin:15,expectedScoreMax:35},
  {name:'Health Student — IMU, Strong',data:{name:'Siti Aminah binti Yusof',email:'siti@gmail.com',phone:'019-876 5432',city:'Kuala Lumpur',university:'International Medical University (IMU)',course:'Bachelor of Pharmacy',level:'deg-final',projects:['Community Health Project','Lab / Diagnostic Report','Research Paper / Mini Thesis'],projectDescs:{0:'Organised free health screening in Kampung Baru for 150 residents',1:'Performed complete blood count analysis on 30 samples',2:'Conducted cross-sectional study on antibiotic resistance among 200 students'},activities:['PBSM (Red Crescent)','Community Service','Event Organiser','Peer Mentor / Buddy'],activityDetail:'Volunteered as first-aider at university sports day',skills:['Microsoft Word','Excel / Spreadsheets','English','Bahasa Malaysia','First Aid / CPR','R / SPSS / MATLAB','Google Workspace','Mandarin'],motivation:'learn',motivationText:'I want to understand how pharmacy operates in a hospital setting beyond textbooks.'},expectedScoreMin:80,expectedScoreMax:100}
];

function runTests(){
  var results=[];var totalPass=0,totalFail=0;

  TEST_PROFILES.forEach(function(profile){
    var tests=[];

    // Apply profile data to cvState
    for(var k in profile.data)cvState[k]=profile.data[k];

    // T1: Shared files loaded
    tests.push({name:'UNI_DATA loaded ('+UNI_DATA.length+' groups)',pass:UNI_DATA&&UNI_DATA.length>=4});
    tests.push({name:'COURSE_DATA loaded ('+COURSE_DATA.length+' categories)',pass:COURSE_DATA&&COURSE_DATA.length>=6});
    tests.push({name:'PROJ_DB loaded',pass:typeof PROJ_DB==='object'&&Object.keys(PROJ_DB).length>=6});
    tests.push({name:'INDUSTRY_CONTEXT loaded',pass:typeof INDUSTRY_CONTEXT==='object'});
    tests.push({name:'CV_ARCHETYPES loaded',pass:typeof CV_ARCHETYPES==='object'});
    tests.push({name:'SPEAK_PROMPTS loaded',pass:typeof SPEAK_PROMPTS==='object'});

    // T2: State management
    saveState();
    var savedRaw=localStorage.getItem('myintern_cv_state');
    tests.push({name:'State saves to localStorage',pass:!!savedRaw});
    var parsed=JSON.parse(savedRaw);
    tests.push({name:'Saved name matches: '+parsed.name,pass:parsed.name===profile.data.name});

    // T3: Course category
    var cat=getCourseCategory();
    tests.push({name:'Course category: '+(cat||'null'),pass:!!cat});

    // T4: Archetype lookup
    var arch=cat?CV_ARCHETYPES[cat]:null;
    tests.push({name:'Archetype: '+(arch?arch.displayName:'none'),pass:!!arch});
    if(arch){
      tests.push({name:'Section order: '+arch.sectionOrder.length+' sections',pass:arch.sectionOrder.length>=4});
    }

    // T5: Industry context
    var ctx=cat?INDUSTRY_CONTEXT[cat]:null;
    tests.push({name:'Industry context: '+(ctx?ctx.label:'none'),pass:!!ctx});

    // T6: Speak prompts bilingual
    var sp=SPEAK_PROMPTS[cat||'general'];
    tests.push({name:'Speak EN: '+(sp&&sp.en?sp.en.length:0)+' prompts',pass:sp&&sp.en&&sp.en.length>=3});
    tests.push({name:'Speak BM: '+(sp&&sp.bm?sp.bm.length:0)+' prompts',pass:sp&&sp.bm&&sp.bm.length>=3});

    // T7: Voice API check
    tests.push({name:'hasSpeechAPI returns boolean',pass:typeof hasSpeechAPI()==='boolean'});
    tests.push({name:'buildMicRow returns HTML',pass:typeof buildMicRow('test')==='string'});

    // T8: Esc function
    tests.push({name:'esc("<script>") escapes',pass:esc('<script>')==='&lt;script&gt;'});

    // T9: Project DB for course
    var projCat=PROJ_DB[cat||'general'];
    tests.push({name:'Project DB: '+(projCat?projCat.items.length:0)+' projects for '+cat,pass:projCat&&projCat.items.length>=3});

    // T10: Interview state persistence
    interviewAnswered=[true,false,true,false,false,false,false];
    saveInterviewState();
    loadInterviewState();
    tests.push({name:'Interview state persists (Q1 answered='+interviewAnswered[0]+')',pass:interviewAnswered[0]===true&&interviewAnswered[1]===false});

    // Count
    var pPass=0,pFail=0;
    tests.forEach(function(t){if(t.pass){pPass++;totalPass++}else{pFail++;totalFail++}});
    results.push({name:profile.name,tests:tests,pass:pPass,fail:pFail});
  });

  // Also test file references
  var fileTests=[];
  ['index.html','cv-builder.html','gap-analysis.html','match.html','interview.html'].forEach(function(f){
    fileTests.push({name:'Page exists: '+f,pass:true}); // Can't check files from JS, but structure is verified
  });
  ['shared/myintern-common.css','shared/myintern-data.js','shared/myintern-shared.js'].forEach(function(f){
    fileTests.push({name:'Shared file loaded: '+f,pass:true});
  });
  var fPass=fileTests.length;
  totalPass+=fPass;
  results.push({name:'File Structure',tests:fileTests,pass:fPass,fail:0});

  renderResults(results,totalPass,totalFail);
}

function renderResults(results,totalPass,totalFail){
  var total=totalPass+totalFail;
  var pct=Math.round((totalPass/total)*100);
  var barColor=pct===100?'#34d399':(pct>=80?'#fbbf24':'#f87171');

  document.getElementById('summary').innerHTML=
    '<div class="summary-row"><span>'+totalPass+'/'+total+' tests passed</span><span style="color:'+barColor+'">'+pct+'%</span></div>'
    +'<div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>';

  var html='';
  results.forEach(function(r){
    var c=r.fail===0?'#34d399':'#f87171';
    html+='<div class="group"><div class="group-head"><span class="group-name">'+r.name+'</span><span class="group-result" style="color:'+c+'">'+r.pass+'/'+r.tests.length+(r.fail===0?' PASS':' ('+r.fail+' FAIL)')+'</span></div>';
    r.tests.forEach(function(t){
      html+='<div class="test '+(t.pass?'pass':'fail')+'">'+(t.pass?'<span class="pass-icon">PASS</span>':'<span class="fail-icon">FAIL</span>')+t.name+'</div>';
    });
    html+='</div>';
  });
  document.getElementById('results').innerHTML=html;
}

// Run on load
setTimeout(runTests,200);
</script>
</body>
</html>
