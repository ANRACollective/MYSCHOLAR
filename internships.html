<style>
/* ══════════════════════════════════════════════════════════════
   DESIGN TOKENS — Dark mode internship palette
   ══════════════════════════════════════════════════════════════ */
:root{
  --bg:#0b1120;
  --bg-elevated:#131b2e;
  --bg-card:#172033;
  --bg-card-hover:#1c2840;
  --bg-glass:rgba(255,255,255,0.06);
  --bg-glass-hover:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.1);
  --glass-border-hover:rgba(255,255,255,0.2);
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:#64748b;
  --accent:#38bdf8;
  --accent-glow:rgba(56,189,248,0.15);
  --urgent:#f87171;
  --urgent-bg:rgba(248,113,113,0.1);
  --success:#34d399;
  --success-bg:rgba(52,211,153,0.1);
  --border:rgba(255,255,255,0.08);
  --border-hover:rgba(255,255,255,0.15);
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;

  /* Industry colour map — 12 industries */
  --c-finance:#60a5fa;
  --c-energy:#fbbf24;
  --c-tech:#f472b6;
  --c-gov:#34d399;
  --c-health:#a78bfa;
  --c-eng:#fb923c;
  --c-media:#f43f5e;
  --c-consult:#38bdf8;
  --c-fmcg:#4ade80;
  --c-legal:#e879f9;
  --c-edu:#fcd34d;
  --c-ngo:#67e8f9;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── HEADER ─────────────────────────────── */
.header{padding:28px 16px 16px;max-width:700px;margin:0 auto}
.brand{font-family:var(--serif);font-size:28px;font-weight:900;color:var(--text-primary);letter-spacing:-0.5px;text-decoration:none;display:inline-block}
.brand span{color:var(--accent)}
nav{display:flex;gap:20px;margin-top:14px}
nav a{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;padding-bottom:5px;border-bottom:2px solid transparent;transition:all 0.2s}
nav a.active{color:var(--accent);border-bottom-color:var(--accent)}
nav a:hover{color:var(--text-secondary)}
.subtitle{font-size:14px;color:var(--text-secondary);margin-top:10px;font-weight:300}

/* ── SEARCH ─────────────────────────────── */
.search-wrap{max-width:700px;margin:22px auto 0;padding:0 16px}
.search-input{width:100%;padding:13px 18px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-family:var(--sans);font-size:14px;outline:none;transition:all 0.2s}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

/* ── FILTERS ────────────────────────────── */
.filters{max-width:700px;margin:16px auto 0;padding:0 16px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{padding:7px 15px;border-radius:18px;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.toggle-row{display:flex;gap:8px;margin-bottom:8px}
.toggle{padding:7px 15px;border-radius:18px;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;user-select:none}
.toggle.on{background:var(--success);color:#064e3b;border-color:var(--success);font-weight:600}
.summary{font-size:12px;color:var(--text-muted);padding:8px 0}

/* ── LOADING STATE ──────────────────────── */
.loading{text-align:center;padding:48px 16px;color:var(--text-muted);font-size:14px}
.loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 3px;animation:pulse 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}

/* ── LIST FEED ──────────────────────────── */

/* ── ROLES PREVIEW ──────────────────────── */
.roles-preview{font-size:12.5px;color:var(--text-muted);line-height:1.5;margin-top:10px;padding:8px 12px;background:var(--bg-elevated);border-radius:8px;border:1px solid var(--border)}

/* ── META ROW ───────────────────────────── */
.meta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;font-size:12.5px;color:var(--text-muted)}

/* ── GLASS APPLY BUTTON ─────────────────── */
.apply-row{margin-top:14px;display:flex;align-items:center;justify-content:space-between}
.apply-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:var(--bg-glass);color:var(--text-primary);border:1.5px solid var(--glass-border);border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;transition:all 0.25s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);letter-spacing:0.2px}

  .apply-row{flex-direction:column}
}

/* ── EMPTY STATE ────────────────────────── */
.empty{text-align:center;padding:48px 16px;color:var(--text-muted);font-size:14px}

/* ── DETAIL MODAL ───────────────────────── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;justify-content:center;align-items:flex-end;padding:0}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center;padding:24px}}

@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

.modal-handle{width:40px;height:4px;background:var(--text-muted);border-radius:2px;margin:12px auto 0;opacity:0.4}

.modal-header{padding:20px 24px 0;display:flex;align-items:flex-start;gap:16px}
.modal-logo{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;background:var(--bg-card);border:1px solid var(--border)}
.modal-logo img{width:100%;height:100%;object-fit:contain;padding:8px;position:absolute;top:0;left:0;background:var(--bg-card);border-radius:14px}
.modal-logo .fallback{font-size:22px;font-weight:700;color:var(--text-secondary)}
.modal-info{flex:1}
.modal-company{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-0.3px}

.detail-card{background:var(--bg-card);border-radius:10px;padding:12px;border:1px solid var(--border)}

.modal-section{margin-bottom:16px}

.modal-tip strong{color:var(--text-secondary)}

.modal-apply{display:block;width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:12px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:all 0.2s;letter-spacing:0.2px}

/* ── FOOTER ─────────────────────────────── */
.footer{text-align:center;padding:20px 16px 32px;font-size:11px;color:var(--text-muted);max-width:700px;margin:0 auto}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

<script>
/* ══════════════════════════════════════════════════════════════
   SUPABASE CONFIG
   ══════════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://ywvfvjvxwhcfprfrkgqm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3dmZ2anZ4d2hjZnByZnJrZ3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTQ5MzEsImV4cCI6MjA5MDYzMDkzMX0.5EzrJuW1fdPca2ZEKGPXXgbd_XYDqKzzu6e-iRQT9po';

const TODAY = new Date();

/* ── Industry → colour key mapping ─────── */
const IND_MAP = {
  'Finance & Banking':  'finance',
  'Energy & Utilities': 'energy',
  'Technology':         'tech',
  'Government / GLC':   'gov',
  'Healthcare':         'health',
  'Engineering':        'eng',
  'Media & Comms':      'media',
  'Consulting':         'consult',
  'FMCG & Retail':      'fmcg',
  'Legal':              'legal',
  'Education':          'edu',
  'Non-profit / NGO':   'ngo'
};

// Short labels for filter chips
const IND_SHORT = {
  'Finance & Banking':  'Finance',
  'Energy & Utilities': 'Energy',
  'Technology':         'Tech',
  'Government / GLC':   'Gov / GLC',
  'Healthcare':         'Healthcare',
  'Engineering':        'Engineering',
  'Media & Comms':      'Media',
  'Consulting':         'Consulting',
  'FMCG & Retail':      'FMCG',
  'Legal':              'Legal',
  'Education':          'Education',
  'Non-profit / NGO':   'NGO'
};

let DATA = []; // populated from Supabase

/* ══════════════════════════════════════════════════════════════
   FETCH DATA FROM SUPABASE
   ══════════════════════════════════════════════════════════════ */
async function fetchInternships() {
  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/internships?is_active=eq.true&order=company.asc',
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        }
      }
    );
    if (!res.ok) throw new Error('Supabase fetch failed: ' + res.status);
    DATA = await res.json();

    // Build industry filter chips from actual data
    buildFilterChips();
    render();

    // Track page load
    gtag('event', 'internships_loaded', { count: DATA.length });
  } catch (err) {
    console.error('Failed to load internships:', err);
    document.getElementById('feed').innerHTML =
      '<div class="empty">Failed to load internships. Please refresh the page.</div>';
  }
}

/* ══════════════════════════════════════════════════════════════
   BUILD FILTER CHIPS DYNAMICALLY
   ══════════════════════════════════════════════════════════════ */
function buildFilterChips() {
  // Collect all unique industries from the data
  const industries = new Set();
  DATA.forEach(item => {
    if (item.industry && Array.isArray(item.industry)) {
      item.industry.forEach(ind => industries.add(ind));
    }
  });

  const chipRow = document.getElementById('chips');
  // Keep the "All" chip, add industry chips
  const sorted = [...industries].sort();
  sorted.forEach(ind => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.industry = ind;
    chip.textContent = IND_SHORT[ind] || ind;
    chip.addEventListener('click', () => {
      document.querySelectorAll('#chips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      render();
      gtag('event', 'internship_filter', { filter: ind });
    });
    chipRow.appendChild(chip);
  });
}

/* ══════════════════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════════════════ */

// Get primary industry key for an item (first in array)
function primaryInd(item) {
  if (!item.industry || !item.industry.length) return 'consult';
  return IND_MAP[item.industry[0]] || 'consult';
}

// Format duration from min/max months
function fmtDuration(item) {
  const min = item.duration_min_months;
  const max = item.duration_max_months;
  if (!min && !max) return 'Varies';
  if (min === max) return min + ' month' + (min !== 1 ? 's' : '');
  return min + '–' + max + ' months';
}

// Format intake/deadline text
function fmtIntake(item) {
  if (item.rolling) return '<span class="rolling-pill">Rolling</span>';
  return item.intake_text || 'Check website';
}

// Is the allowance stated?
function isPaid(item) {
  if (!item.allowance_text) return false;
  const lower = item.allowance_text.toLowerCase();
  return !lower.includes('not publicly') && !lower.includes('unpaid') && !lower.includes('none');
}

// Build logo HTML
function logoHTML(item, size) {
  const sz = size || 80;
  const domain = item.logo_domain;
  const name = item.company;
  if (!domain) return '<span class="fallback">' + name[0] + '</span>';
  const url = 'https://img.logo.dev/' + domain + '?token=pk_anonymous&size=' + sz + '&format=png';
  return '<span class="fallback">' + name[0] + '</span><img src="' + url + '" alt="' + name + '" onerror="this.remove()">';
}

/* ══════════════════════════════════════════════════════════════
   RENDER LIST
   ══════════════════════════════════════════════════════════════ */
function render() {
  const feed = document.getElementById('feed');
  const industry = document.querySelector('#chips .chip.active')?.dataset.industry || 'all';
  const paidOnly = document.getElementById('paidToggle').classList.contains('on');
  const q = document.getElementById('search').value.toLowerCase().trim();

  feed.innerHTML = '';
  let count = 0;

  DATA.forEach((item, idx) => {
    // Industry filter
    if (industry !== 'all') {
      if (!item.industry || !item.industry.includes(industry)) return;
    }
    // Paid filter
    if (paidOnly && !isPaid(item)) return;
    // Search filter
    if (q) {
      const haystack = (item.company + ' ' + item.programme_name + ' ' + (item.roles_available || '')).toLowerCase();
      if (!haystack.includes(q)) return;
    }
    count++;

    const pk = primaryInd(item);
    const el = document.createElement('div');
    el.className = 'row ind-' + pk;
    el.style.animation = 'fadeIn 0.25s ease ' + (Math.min(count, 20) * 0.03) + 's both';
    el.onclick = () => openModal(idx);

    // Build industry pills (show first 2)
    const pills = (item.industry || []).slice(0, 2).map(ind => {
      const key = IND_MAP[ind] || 'consult';
      return '<span class="ind-pill pill-' + key + '">' + (IND_SHORT[ind] || ind) + '</span>';
    }).join('');

    // Roles preview (truncate to ~80 chars)
    let rolesPreview = item.roles_available || '';
    if (rolesPreview.length > 90) rolesPreview = rolesPreview.substring(0, 87) + '...';

    // Stipend display
    const stipendHTML = isPaid(item)
      ? '<span class="meta-item stipend"><span class="ic">&#x1F4B0;</span>' + item.allowance_text + '</span>'
      : '<span class="meta-item stipend-unknown"><span class="ic">&#x1F4B0;</span>Not stated</span>';

    el.innerHTML =
      '<div class="row-top">' +
        '<div class="logo-wrap">' + logoHTML(item) + '</div>' +
        '<div class="row-header">' +
          '<div class="company-line">' +
            '<span class="company">' + item.company + '</span>' +
            pills +
          '</div>' +
          '<div class="programme">' + item.programme_name + '</div>' +
        '</div>' +
      '</div>' +
      (rolesPreview ? '<div class="roles-preview">' + rolesPreview + '</div>' : '') +
      '<div class="meta">' +
        '<span class="meta-item"><span class="ic">&#x1F4CD;</span>' + fmtDuration(item) + '</span>' +
        stipendHTML +
        '<span class="meta-item"><span class="ic">&#x1F4C5;</span>' + fmtIntake(item) + '</span>' +
      '</div>' +
      '<div class="apply-row">' +
        '<a href="' + (item.url || '#') + '" target="_blank" rel="noopener" class="apply-btn" onclick="event.stopPropagation();gtag(\'event\',\'internship_apply\',{company:\'' + item.company.replace(/'/g, '') + '\'})">Apply <span class="arrow">&rarr;</span></a>' +
        '<span class="view-hint">Tap for details</span>' +
      '</div>';

    feed.appendChild(el);
  });

  // Summary
  document.getElementById('summary').textContent = count + ' internship' + (count !== 1 ? 's' : '') + ' found';

  // Empty state
  if (count === 0) {
    feed.innerHTML = '<div class="empty">No internships match your filters. Try broadening your search.</div>';
  }
}

/* ══════════════════════════════════════════════════════════════
   DETAIL MODAL
   ══════════════════════════════════════════════════════════════ */
function openModal(idx) {
  const item = DATA[idx];
  const overlay = document.getElementById('modalOverlay');
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');

  // Industry pills
  const pills = (item.industry || []).map(ind => {
    const key = IND_MAP[ind] || 'consult';
    return '<span class="ind-pill pill-' + key + '">' + ind + '</span>';
  }).join('');

  header.innerHTML =
    '<div class="modal-logo">' + logoHTML(item, 120) + '</div>' +
    '<div class="modal-info">' +
      '<div class="modal-company">' + item.company + '</div>' +
      '<div class="modal-programme">' + item.programme_name + '</div>' +
      '<div class="modal-pills">' + pills + '</div>' +
    '</div>';

  // Build body
  let html = '';

  // Description (if available) or roles
  if (item.description) {
    html += '<p class="modal-desc">' + item.description + '</p>';
  }

  // Detail grid
  html += '<div class="detail-grid">' +
    '<div class="detail-card"><div class="detail-label">Allowance</div><div class="detail-value' + (isPaid(item) ? ' green' : '') + '">' + (item.allowance_text || 'Not stated') + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">Duration</div><div class="detail-value">' + fmtDuration(item) + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">Study Level</div><div class="detail-value">' + (item.study_level || 'Any') + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">Intake</div><div class="detail-value">' + (item.intake_text || 'Check website') + '</div></div>' +
    '</div>';

  // Roles
  if (item.roles_available) {
    html += '<div class="modal-section">' +
      '<div class="modal-section-title">Roles Available</div>' +
      '<p>' + item.roles_available + '</p>' +
      '</div>';
  }

  // Eligibility
  if (item.eligibility) {
    html += '<div class="modal-section">' +
      '<div class="modal-section-title">Eligibility</div>' +
      '<p>' + item.eligibility + '</p>' +
      '</div>';
  }

  // Tips
  if (item.tips) {
    html += '<div class="modal-tip"><strong>Tip:</strong> ' + item.tips + '</div>';
  }

  // Apply CTA
  html += '<a href="' + (item.url || '#') + '" target="_blank" rel="noopener" class="modal-apply" onclick="gtag(\'event\',\'internship_apply_modal\',{company:\'' + item.company.replace(/'/g, '') + '\'})">Apply to ' + item.company + ' &rarr;</a>';

  body.innerHTML = html;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Track modal open
  gtag('event', 'internship_detail_view', { company: item.company });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════════════════════════════════════════
   FILTER EVENT LISTENERS
   ══════════════════════════════════════════════════════════════ */

// "All" chip click handler (already in DOM)
document.querySelector('#chips .chip[data-industry="all"]').addEventListener('click', () => {
  document.querySelectorAll('#chips .chip').forEach(c => c.classList.remove('active'));
  document.querySelector('#chips .chip[data-industry="all"]').classList.add('active');
  render();
});

// Toggle clicks
['paidToggle', 'openToggle'].forEach(id => {
  document.getElementById(id).addEventListener('click', function() {
    this.classList.toggle('on');
    render();
    gtag('event', 'internship_toggle', { toggle: id, state: this.classList.contains('on') ? 'on' : 'off' });
  });
});

// Search input
let searchTimeout;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    render();
    if (this.value.trim()) {
      gtag('event', 'internship_search', { query: this.value.trim() });
    }
  }, 200); // debounce 200ms
});

/* ══════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════ */
fetchInternships();
</script>
</body>
</html>
