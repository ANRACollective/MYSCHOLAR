name: Deactivate expired internships

# Daily at 03:15 UTC (~11:15 MYT) — early enough that expired-today rows
# disappear before students open the app in the morning.
on:
  schedule:
    - cron: '15 3 * * *'
  # Manual dry run / backfill via the Actions tab
  workflow_dispatch:

jobs:
  deactivate:
    runs-on: ubuntu-latest
    steps:
      - name: POST to deactivate-expired edge function
        env:
          FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
          CRON_SECRET: ${{ secrets.DEACTIVATE_CRON_SECRET }}
        run: |
          if [ -z "$FUNCTIONS_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SUPABASE_FUNCTIONS_URL or DEACTIVATE_CRON_SECRET secret not set — see supabase/functions/deactivate-expired/README.md"
            exit 1
          fi
          # Fail on non-2xx so a broken schedule surfaces as a red action, not a silent skip
          curl -sSf -X POST \
            "$FUNCTIONS_URL/deactivate-expired" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -w "\nHTTP: %{http_code}\n" \
            --data '{}'
